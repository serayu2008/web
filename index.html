<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>학교생활로 알아보는 MBTI 테스트</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#eef7f0,#dceadf);display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#fff;width:90%;max-width:700px;border-radius:20px;padding:32px;box-shadow:0 12px 30px rgba(0,0,0,.15)}
h1{text-align:center;color:#4f7159}.sub{text-align:center;color:#666}
button{width:100%;padding:14px;margin:8px 0;border:0;border-radius:12px;background:#7fa58b;color:#fff;font-size:16px;cursor:pointer}
button:hover{background:#678c73}.progress{height:10px;background:#dbe7dd;border-radius:10px;overflow:hidden;margin:20px 0}
.bar{height:100%;width:0;background:#7fa58b;transition:.3s}.q{font-size:22px;font-weight:bold;text-align:center;margin:20px 0;color:#355041}
#quiz,#result{display:none}.type{font-size:52px;text-align:center;color:#557964;font-weight:bold}
</style>
</head>
<body>
<div class="card">
<div id="start">
<h1>학교생활로 알아보는 MBTI 테스트</h1>
<p class="sub">학교생활을 바탕으로 알아보는 재미용 성향 테스트입니다.</p>
<button onclick="start()">테스트 시작</button>
</div>
<div id="quiz">
<div class="progress"><div class="bar" id="bar"></div></div>
<div class="q" id="q"></div>
<div id="a"></div>
</div>
<div id="result">
<h1>결과</h1>
<div class="type" id="type"></div>
<p id="desc" style="text-align:center"></p>
<button onclick="location.reload()">다시하기</button>
</div>
</div>
<script>
const qs=[
{q:"쉬는 시간에 먼저 친구에게 말을 건다.",t:"EI"},
{q:"새로운 수행평가가 기대된다.",t:"SN"},
{q:"공감보다 해결책을 제시한다.",t:"TF"},
{q:"시험 계획을 미리 세운다.",t:"JP"},
{q:"혼자 공부하는 것이 편하다.",t:"EI"},
{q:"새로운 방법을 시도하는 것을 좋아한다.",t:"SN"},
{q:"규칙을 잘 지키는 편이다.",t:"TF"},
{q:"할 일을 미루지 않는다.",t:"JP"},
{q:"발표를 좋아한다.",t:"EI"},
{q:"상상을 자주 한다.",t:"SN"},
{q:"감정보다 사실을 중시한다.",t:"TF"},
{q:"시간표를 작성하는 것을 좋아한다.",t:"JP"}
];
const c=[["매우 그렇다",2],["그렇다",1],["보통",0],["아니다",-1],["전혀 아니다",-2]];
let i=0,s={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
function start(){start=document.getElementById("start").style.display="none";quiz.style.display="block";show();}
function show(){bar.style.width=(i/qs.length*100)+"%";q.textContent=(i+1)+". "+qs[i].q;a.innerHTML="";
c.forEach(x=>{let b=document.createElement("button");b.textContent=x[0];b.onclick=()=>ans(x[1]);a.appendChild(b);});}
function ans(v){let t=qs[i].t;if(v>0)s[t[0]]+=v;else if(v<0)s[t[1]]+=-v;i++;if(i<qs.length)show();else res();}
function res(){quiz.style.display="none";result.style.display="block";
let r=(s.E>=s.I?"E":"I")+(s.S>=s.N?"S":"N")+(s.T>=s.F?"T":"F")+(s.J>=s.P?"J":"P");
type.textContent=r;
desc.textContent="공식 MBTI가 아닌 학교생활 기반의 재미용 성향 결과입니다.";
}
</script>
</body></html>
