<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학교생활로 알아보는 MBTI 테스트</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"맑은 고딕",sans-serif;}
body{
background:#edf5ef;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}
.card{
background:white;
width:100%;
max-width:700px;
padding:35px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

h1{
text-align:center;
color:#496b56;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:25px;
}

.progress{
height:10px;
background:#dbe7dd;
border-radius:10px;
margin-bottom:25px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#6d9b77;
transition:.3s;
}

.question{
font-size:22px;
font-weight:bold;
margin-bottom:25px;
color:#3b5644;
text-align:center;
}

button{
width:100%;
padding:15px;
margin:8px 0;
border:none;
border-radius:10px;
background:#7ea98a;
color:white;
font-size:17px;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#678f72;
}

#result{
display:none;
text-align:center;
}

.type{
font-size:48px;
color:#53775d;
margin:20px;
font-weight:bold;
}

.small{
font-size:18px;
line-height:1.7;
color:#555;
}

.restart{
margin-top:25px;
}
</style>
</head>

<body>

<div class="card">

<div id="quiz">

<h1>학교생활 성향 테스트</h1>
<p>학교에서의 행동을 기준으로 성향을 알아보세요.</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="question" id="question"></div>

<div id="answers"></div>

</div>

<div id="result">

<h1>테스트 결과</h1>

<div class="type" id="type"></div>

<div class="small" id="desc"></div>

<button class="restart" onclick="location.reload()">다시하기</button>

</div>

</div>

<script>

const questions=[

{q:"쉬는 시간에 먼저 친구에게 말을 건다.",type:"EI"},
{q:"새로운 수행평가를 보면 기대된다.",type:"SN"},
{q:"친구의 고민은 공감보다 해결이 중요하다.",type:"TF"},
{q:"시험은 미리 계획해서 준비한다.",type:"JP"},
{q:"혼자 공부하는 시간이 더 좋다.",type:"EI"},
{q:"익숙한 방법보다 새로운 방법을 시도한다.",type:"SN"},
{q:"규칙은 지키는 것이 가장 중요하다.",type:"TF"},
{q:"할 일을 미루지 않는 편이다.",type:"JP"},
{q:"발표하는 것이 재미있다.",type:"EI"},
{q:"상상을 자주 하는 편이다.",type:"SN"},
{q:"감정보다 사실을 먼저 본다.",type:"TF"},
{q:"시간표나 계획표를 자주 작성한다.",type:"JP"}

];

let index=0;

let score={
E:0,I:0,
S:0,N:0,
T:0,F:0,
J:0,P:0
};

const choices=[
["매우 그렇다",2],
["그렇다",1],
["보통이다",0],
["아니다",-1],
["전혀 아니다",-2]
];

function showQuestion(){

document.getElementById("bar").style.width=
(index/questions.length*100)+"%";

document.getElementById("question").innerHTML=
(index+1)+". "+questions[index].q;

const area=document.getElementById("answers");
area.innerHTML="";

choices.forEach(c=>{

const b=document.createElement("button");
b.innerHTML=c[0];

b.onclick=()=>answer(c[1]);

area.appendChild(b);

});

}

function answer(value){

let t=questions[index].type;

if(value>0){

score[t[0]]+=value;

}

else if(value<0){

score[t[1]]+=Math.abs(value);

}

index++;

if(index<questions.length){

showQuestion();

}else{

showResult();

}

}

function showResult(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

let result="";

result+=score.E>=score.I?"E":"I";
result+=score.S>=score.N?"S":"N";
result+=score.T>=score.F?"T":"F";
result+=score.J>=score.P?"J":"P";

document.getElementById("type").innerHTML=result;

const descs={

ISTJ:"책임감이 강하고 계획적인 모범 학생입니다.",

ISFJ:"배려심이 많고 친구를 잘 도와주는 학생입니다.",

INFJ:"깊이 생각하고 목표를 위해 노력하는 학생입니다.",

INTJ:"분석력이 뛰어나고 스스로 공부를 잘합니다.",

ISTP:"실습과 문제 해결을 좋아합니다.",

ISFP:"차분하고 자신의 속도를 유지합니다.",

INFP:"창의적이며 상상력이 풍부합니다.",

INTP:"호기심이 많고 탐구를 좋아합니다.",

ESTP:"활동적이고 도전을 즐깁니다.",

ESFP:"밝고 친구들과 잘 어울립니다.",

ENFP:"새로운 아이디어가 많고 적극적입니다.",

ENTP:"토론과 새로운 생각을 좋아합니다.",

ESTJ:"리더십이 강하고 계획적으로 행동합니다.",

ESFJ:"친구들과 협력하는 것을 좋아합니다.",

ENFJ:"사람들을 이끄는 능력이 뛰어납니다.",

ENTJ:"목표 지향적이고 추진력이 강합니다."

};

document.getElementById("desc").innerHTML=
descs[result]||"균형 잡힌 학교생활 성향입니다.";

document.getElementById("bar").style.width="100%";

}

showQuestion();

</script>

</body>
</html>
