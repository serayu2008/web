<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>학교생활로 알아보는 MBTI 테스트</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#eef8f2,#d8eadb);display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{max-width:720px;width:92%;background:#fff;border-radius:28px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,.12);position:relative}
.card:before{content:"🌿";position:absolute;top:15px;right:20px;font-size:30px}
h1{text-align:center;color:#53775d}p{text-align:center;color:#666}
button{width:100%;padding:14px;margin:8px 0;border:none;border-radius:16px;background:#86b394;color:#fff;font-size:16px;cursor:pointer}
button:hover{background:#6f9f80}
.progress{height:10px;background:#e2eee4;border-radius:10px;overflow:hidden;margin:18px 0}
.bar{height:100%;width:0;background:#7ca98b;transition:.3s}
.q{background:#f6fbf7;padding:18px;border-radius:16px;font-size:21px;font-weight:bold;text-align:center;color:#3d5a47}
#quiz,#result{display:none}.type{font-size:54px;text-align:center;color:#557964}.box{background:#f8fcf8;border-radius:16px;padding:16px;margin-top:16px;line-height:1.7}
</style></head><body><div class='card'>
<div id='start'><h1>학교생활로 알아보는 MBTI 테스트</h1><p>학교생활을 바탕으로 알아보는 재미용 테스트!</p><button onclick='startTest()'>테스트 시작</button></div>
<div id='quiz'><div class='progress'><div class='bar' id='bar'></div></div><div class='q' id='q'></div><div id='ans'></div></div>
<div id='result'><h1>테스트 결과</h1><div class='type' id='type'></div><div class='box' id='desc'></div><button onclick='location.reload()'>🔄 다시하기</button></div>
</div><script>
const MBTI={"ISTJ": "📚 책임감이 강하고 계획적인 모범생이에요. 맡은 일은 끝까지 해내며 믿음직한 모습을 보여줍니다.", "ISFJ": "💚 배려심이 많고 친구를 잘 챙겨요. 협동 활동에서 든든한 존재입니다.", "INFJ": "🌱 깊이 생각하고 목표를 향해 꾸준히 노력하는 스타일이에요.", "INTJ": "🧠 분석력이 뛰어나고 스스로 공부하는 것을 좋아해요.", "ISTP": "🔧 문제 해결을 즐기며 실습 활동에서 강점을 보여요.", "ISFP": "🎨 차분하고 자신만의 속도로 성장하는 성향이에요.", "INFP": "✨ 상상력이 풍부하고 창의적인 아이디어가 많아요.", "INTP": "💡 호기심이 많고 새로운 지식을 탐구하는 것을 좋아해요.", "ESTP": "⚡ 도전을 즐기고 활동적인 학교생활을 합니다.", "ESFP": "😊 밝고 긍정적인 분위기 메이커예요.", "ENFP": "🌈 새로운 경험을 좋아하고 친구들과 잘 어울립니다.", "ENTP": "🚀 토론과 새로운 아이디어를 좋아하는 창의적인 성향입니다.", "ESTJ": "📅 계획을 잘 세우고 리더십이 뛰어나요.", "ESFJ": "🤝 협동심이 강하고 주변 사람을 잘 도와줍니다.", "ENFJ": "🌟 친구들을 이끌고 배려하는 리더형입니다.", "ENTJ": "🏆 목표를 향해 적극적으로 도전하는 추진력 있는 성향입니다."};
const qs=[["쉬는 시간에 먼저 친구에게 말을 건다.","EI"],["새로운 수행평가가 기대된다.","SN"],["공감보다 해결책을 제시한다.","TF"],["시험 계획을 미리 세운다.","JP"],["혼자 공부가 편하다.","EI"],["새로운 방법을 시도한다.","SN"],["규칙을 잘 지킨다.","TF"],["미루지 않는다.","JP"],["발표를 좋아한다.","EI"],["상상을 자주 한다.","SN"],["감정보다 사실을 중시한다.","TF"],["시간표를 작성한다.","JP"]];
const ch=[["매우 그렇다",2],["그렇다",1],["보통",0],["아니다",-1],["전혀 아니다",-2]];
let i=0,s={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
function startTest(){start.style.display='none';quiz.style.display='block';show();}
function show(){bar.style.width=(i/qs.length*100)+'%';q.textContent=(i+1)+'. '+qs[i][0];ans.innerHTML='';ch.forEach(c=>{let b=document.createElement('button');b.textContent=c[0];b.onclick=()=>go(c[1]);ans.appendChild(b);})}
function go(v){let t=qs[i][1];if(v>0)s[t[0]]+=v;else if(v<0)s[t[1]]+=-v;i++;i<qs.length?show():done();}
function done(){quiz.style.display='none';result.style.display='block';let r=(s.E>=s.I?'E':'I')+(s.S>=s.N?'S':'N')+(s.T>=s.F?'T':'F')+(s.J>=s.P?'J':'P');type.textContent=''+r;desc.innerHTML='<b>'+r+' 특징</b><br><br>'+MBTI[r]+'<br><br><small>※ 공식 MBTI 검사가 아닌 재미를 위한 성향 테스트입니다.</small>';}
</script></body></html>
